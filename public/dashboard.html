<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מנחשים את ליגת האלופות</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <main>
        <header>
            <h1>משחק הניחושים של ליגת האלופות</h1>
            <h2 id="user-greeting"></h2>
        </header>

        <section>
            <h2>הטורניר הנוכחי</h2>
            <p id="tournament-name"></p>
            <p id="tournament-status"></p>
        </section>

        <section>
            <h2>יצירת ליגה חדשה</h2>

            <form id="create-league-form">
                <label for="league-name">שם הליגה</label>

                <input
                    id="league-name"
                    name="leagueName"
                    type="text"
                    maxlength="50"
                    required
                >

                <button type="submit">יצירת ליגה</button>
            </form>

            <p id="create-league-message"></p>
        </section>

        <section>
            <h2>הליגות שלי</h2>

            <div id="leagues-list">
                <p>טוען ליגות...</p>
            </div>
        </section>

        <button id="logout-btn" type="button">
            התנתקות
        </button>
    </main>

    <script src="/js/dashboard.js"></script>
</body>
</html>
